<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find ME Game</title>
    <style>
        body {
            background-color: lightblue;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }
        .game-container {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 {
            color: #333;
            margin-bottom: 1.5rem;
        }
        .bold-title {
            font-weight: bold;
        }
        input {
            padding: 0.5rem;
            font-size: 1rem;
            border: 2px solid #ccc;
            border-radius: 5px;
            width: 200px;
            text-align: center;
        }
        button {
            padding: 0.5rem 1rem;
            font-size: 1rem;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 1rem;
        }
        button:hover {
            background-color: #0056b3;
        }
        #message {
            margin-top: 1rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <h1 class="bold-title">Find Me. I am a Colour</h1>
        <p>Type your answer below:</p>
        <input type="text" id="answer" placeholder="Enter answer here">
        <br>
        <button onclick="checkAnswer()">Submit</button>
        <p id="message"></p>
    </div>

    <script>
        function checkAnswer() {
            const answer = document.getElementById('answer').value;
            const message = document.getElementById('message');
            
            // Simple logic for the "Find ME" game
            if (answer.toLowerCase() === 'blue' || answer.toLowerCase() === 'lightblue' || answer.toLowerCase() === 'green' || answer.toLowerCase() === 'yellow' || answer.toLowerCase() === 'red')  {
                message.textContent = "You found ME! 🎉";
                message.style.color = "green";
            } else {
                message.textContent = "Not quite! Keep looking. 🔍";
                message.style.color = "red";
            }
        }
    </script>

</body>
</html>
